# Render Blueprint for monorepo
services:
  # 1. Frontend (Static Site)
  - type: web
    name: where-is-my-bus-frontend
    runtime: static
    rootDir: my-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - "my-app/**"

  # 2. Backend (Docker Web Service)
  - type: web
    name: where-is-my-bus-backend
    runtime: docker
    rootDir: backend
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # or specify your preferred plan
    buildFilter:
      paths:
        - "backend/**"
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this in Render dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: DRIVER_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
